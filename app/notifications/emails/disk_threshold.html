<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#f0f2f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#f0f2f5">
<tr><td align="center" style="padding:40px 16px">
<table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0" style="max-width:600px;width:100%;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.12)">

  <tr>
    <td style="background:#b36200;padding:8px 28px">
      <span style="font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.75)">WAZUH PLATFORM</span>
    </td>
  </tr>

  <tr>
    <td style="background:#ffffff;padding:26px 28px 22px;border-bottom:1px solid #d0d7de">
      <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
        <tr>
          <td style="vertical-align:middle">
            <div style="font-size:20px;font-weight:700;color:#1a1f2e;line-height:1.3">Disk Threshold Alert</div>
            <div style="font-size:12px;color:#57606a;margin-top:3px">Disk usage has exceeded the configured threshold</div>
          </td>
          <td align="right" style="vertical-align:middle;padding-left:12px">
            <div style="display:inline-block;background:#fff3cd;color:#b36200;border-radius:20px;padding:4px 14px;font-size:11px;font-weight:700;letter-spacing:0.5px;white-space:nowrap">Disk Alert</div>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <tr>
    <td style="background:#ffffff;padding:24px 28px 20px">
      <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="border:1px solid #d0d7de;border-radius:6px;overflow:hidden">
        <tr>
          <td style="padding:11px 16px;font-size:10px;font-weight:700;color:#57606a;text-transform:uppercase;letter-spacing:0.8px;background:#f6f8fa;width:34%;vertical-align:top;border-bottom:1px solid #d0d7de">Mount Point</td>
          <td style="padding:11px 16px;font-size:13px;color:#1a1f2e;font-family:'Courier New',Courier,monospace;border-bottom:1px solid #d0d7de;word-break:break-all">{{ mount }}</td>
        </tr>
        <tr>
          <td style="padding:11px 16px;font-size:10px;font-weight:700;color:#57606a;text-transform:uppercase;letter-spacing:0.8px;background:#f6f8fa;width:34%;vertical-align:top;border-bottom:1px solid #d0d7de">Current Usage</td>
          <td style="padding:11px 16px;font-size:13px;color:#b36200;font-weight:700;border-bottom:1px solid #d0d7de">{{ percent }}%</td>
        </tr>
        <tr>
          <td style="padding:11px 16px;font-size:10px;font-weight:700;color:#57606a;text-transform:uppercase;letter-spacing:0.8px;background:#f6f8fa;width:34%;vertical-align:top">Threshold</td>
          <td style="padding:11px 16px;font-size:13px;color:#1a1f2e">{{ threshold }}%</td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- Usage bar -->
  <tr>
    <td style="background:#ffffff;padding:0 28px 28px">
      <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
        <tr>
          <td>
            <div style="background:#e5e7eb;border-radius:4px;height:8px;overflow:hidden">
              <div style="background:#b36200;height:8px;border-radius:4px;width:{{ percent:80 }}%"></div>
            </div>
            <div style="font-size:11px;color:#8b949e;margin-top:5px">{{ percent:80 }}% used &mdash; threshold at {{ threshold:80 }}%</div>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <tr>
    <td style="background:#f6f8fa;border-top:1px solid #d0d7de;padding:14px 28px">
      <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
        <tr>
          <td><span style="font-size:11px;color:#8b949e">Wazuh Morpheus &nbsp;&bull;&nbsp; Automated Notification</span></td>
          <td align="right"><span style="font-size:11px;color:#8b949e">{{ timestamp }}</span></td>
        </tr>
      </table>
    </td>
  </tr>

</table>
</td></tr>
</table>
</body>
</html>
